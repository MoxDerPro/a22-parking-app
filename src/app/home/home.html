<div class="app-shell">
  <section class="hero home-hero">
    <div class="hero-text">
      <h1>Brenner ParkRadar</h1>
      <p>Finde freie Stellplätze entlang der Brennerautobahn!.</p>
    </div>
    <span class="hero-badge">P</span>
  </section>

  <div class="home-body">
    <div class="features">
      <div class="feature-card">
        <h3>Echtzeit-Daten</h3>
        <p>Aktuelle Verfügbarkeit aller Parkplätze.</p>
      </div>
      <div class="feature-card">
        <h3>Kartenansicht</h3>
        <p>Alle Standorte auf einen Blick.</p>
      </div>
      <div class="feature-card">
        <h3>Favoriten</h3>
        <p>Speichere deine häufig genutzten Parkplätze für schnellen Zugriff.</p>
      </div>
    </div>

    <button class="cta-button" (click)="goToList()">
      Parkplätze anzeigen &rarr;
    </button>
  </div>
</div>
